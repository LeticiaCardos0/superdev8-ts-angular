<h1>Cadastro Colaborador</h1>

<div>
    <div>
        <label for="campo-nome">Nome</label>
        <input type="text" id="campo-nome" [(ngModel)]="nome">
    </div>
    <div>
        <label for="campo-data-nascimento">Data de Nascimento</label>
        <input type="date" id="campo-data-nascimento" [(ngModel)]="dataNascimento">
    </div>
    <div>
        <label for="campo-valor-hora">Valor Hora</label>
        <input type="number" id="campo-valor-hora" [(ngModel)]="valorHora">
    </div>
    <div>
        <label for="campo-quantidade-horas">Quantidade de Horas</label>
        <input type="time" id="campo-quantidade-horas" [(ngModel)]="quantidadeHoras">
    </div>
    <div>
        <label for="campo-vale-refeicao">Valor vale Refeição</label>
        <input type="number" id="campo-vale-refeicao" [(ngModel)]="valorValeRefeicao">
    </div>
    <div>
        <label for="campo-vale-transporte">Valor vale Transporte</label>
        <input type="number" id="campo-vale-transporte" [(ngModel)]="valorValeTransporte">
    </div>
        <div>
        <label for="campo-plano-saude">Data de Nascimento</label>
        <select id="campo-plano-saude" [(ngModel)]="planoSaude">
            <option value="" selected>Selecione</option>
            <option value="300">R$ 300,00</option>
            <option value="500">R$ 500,00</option>
            <option value="700">R$ 700,00</option>
        </select>
    </div>
</div>

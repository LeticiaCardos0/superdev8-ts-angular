<div class="max-w-5xl mx-auto p-6">

    <!-- Título -->
    <div class="mb-8">
        <h1 class="text-4xl font-bold text-gray-800">
            Cadastro Colaborador
        </h1>

        <p class="text-gray-500 mt-2">
            Gerencie os dados dos colaboradores
        </p>
    </div>

    <!-- Card Formulário -->
    <div class="bg-white rounded-2xl shadow-md p-6">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

            <!-- Nome -->
            <div>
                <label for="campo-nome"
                    class="block text-gray-700 font-semibold mb-2">
                    Nome
                </label>

                <input
                    type="text"
                    id="campo-nome"
                    [(ngModel)]="nome"
                    placeholder="Digite o nome"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition"
                >
            </div>

            <!-- Data Nascimento -->
            <div>
                <label for="campo-data-nascimento"
                    class="block text-gray-700 font-semibold mb-2">
                    Data de Nascimento
                </label>

                <input
                    type="date"
                    id="campo-data-nascimento"
                    [(ngModel)]="dataNascimento"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition"
                >
            </div>

            <!-- Valor Hora -->
            <div>
                <label for="campo-valor-hora"
                    class="block text-gray-700 font-semibold mb-2">
                    Valor Hora
                </label>

                <input
                    type="number"
                    id="campo-valor-hora"
                    [(ngModel)]="valorHora"
                    placeholder="Digite o valor da hora"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition"
                >
            </div>

            <!-- Quantidade Horas -->
            <div>
                <label for="campo-quantidade-horas"
                    class="block text-gray-700 font-semibold mb-2">
                    Quantidade de Horas
                </label>

                <input
                    type="number"
                    id="campo-quantidade-horas"
                    [(ngModel)]="quantidadeHoras"
                    placeholder="Digite a quantidade de horas"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition"
                >
            </div>

            <!-- Vale Refeição -->
            <div>
                <label for="campo-vale-refeicao"
                    class="block text-gray-700 font-semibold mb-2">
                    Vale Refeição
                </label>

                <input
                    type="number"
                    id="campo-vale-refeicao"
                    [(ngModel)]="valorValeRefeicao"
                    placeholder="Digite o valor"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition"
                >
            </div>

            <!-- Vale Transporte -->
            <div>
                <label for="campo-vale-transporte"
                    class="block text-gray-700 font-semibold mb-2">
                    Vale Transporte
                </label>

                <input
                    type="number"
                    id="campo-vale-transporte"
                    [(ngModel)]="valorValeTransporte"
                    placeholder="Digite o valor"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition"
                >
            </div>

            <!-- Plano Saúde -->
            <div class="md:col-span-2">
                <label for="campo-plano-saude"
                    class="block text-gray-700 font-semibold mb-2">
                    Plano de Saúde
                </label>

                <select
                    id="campo-plano-saude"
                    [(ngModel)]="planoSaude"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition"
                >
                    <option value="" selected>Selecione</option>
                    <option value="300">R$ 300,00</option>
                    <option value="500">R$ 500,00</option>
                    <option value="700">R$ 700,00</option>
                </select>
            </div>

        </div>

        <!-- Botão -->
        <div class="mt-8">
            <button
                class="bg-gradient-to-r from-teal-400 to-teal-600 hover:from-teal-500 hover:to-teal-700 text-white font-semibold px-8 py-3 rounded-xl shadow-md transition transform hover:scale-105"
            >
                <i class="fa-solid fa-save mr-2"></i>
                Salvar
            </button>
        </div>

    </div>

    <!-- Lista -->
    <div class="bg-white rounded-2xl shadow-md mt-8 overflow-hidden">

        <div class="bg-gradient-to-r from-teal-500 to-teal-600 px-6 py-4">
            <h2 class="text-xl font-semibold text-white">
                <i class="fa-solid fa-users mr-2"></i>
                Colaboradores Cadastrados
            </h2>
        </div>

        <ul class="divide-y divide-gray-200">

            <li class="px-6 py-4 hover:bg-gray-50 transition">

                <div class="flex items-center justify-between">

                    <div>
                        <p class="font-semibold text-gray-800">
                            João Silva
                        </p>

                        <p class="text-sm text-gray-500">
                            Salário Líquido: R$ 3.500,00
                        </p>
                    </div>

                    <div class="flex gap-2">

                        <button
                            class="text-yellow-600 hover:text-yellow-700 bg-yellow-50 hover:bg-yellow-100 p-2 rounded-lg transition"
                        >
                            <i class="fa-solid fa-pencil"></i>
                        </button>

                        <button
                            class="text-red-600 hover:text-red-700 bg-red-50 hover:bg-red-100 p-2 rounded-lg transition"
                        >
                            <i class="fa-solid fa-trash"></i>
                        </button>

                    </div>

                </div>

            </li>

        </ul>

    </div>

</div>
